naftiko: 1.0.0-alpha2
info:
  label: Vercel v0 Platform API — Chats
  description: 'Vercel v0 Platform API — Chats. 3 operations. Lead operation: Create Chat. Self-contained Naftiko capability
    covering one Vercel business surface.'
  tags:
  - Vercel
  - Chats
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERCEL_API_KEY: VERCEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: v0-platform-chats
    baseUri: https://v0.dev/api
    description: Vercel v0 Platform API — Chats business capability. Self-contained, no shared references.
    resources:
    - name: v1-chat
      path: /v1/chat
      operations:
      - name: createchat
        method: POST
        description: Create Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-chat-chatId
      path: /v1/chat/{chatId}
      operations:
      - name: continuechat
        method: POST
        description: Continue Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatId
          in: path
          type: string
          description: Existing chat session ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getchat
        method: GET
        description: Get Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatId
          in: path
          type: string
          description: Chat session ID
          required: true
    authentication:
      type: bearer
      token: '{{env.VERCEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: v0-platform-chats-rest
    port: 8080
    description: REST adapter for Vercel v0 Platform API — Chats. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/chat
      name: v1-chat
      description: REST surface for v1-chat.
      operations:
      - method: POST
        name: createchat
        description: Create Chat
        call: v0-platform-chats.createchat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/chat/{chatid}
      name: v1-chat-chatid
      description: REST surface for v1-chat-chatId.
      operations:
      - method: POST
        name: continuechat
        description: Continue Chat
        call: v0-platform-chats.continuechat
        with:
          chatId: rest.chatId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getchat
        description: Get Chat
        call: v0-platform-chats.getchat
        with:
          chatId: rest.chatId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: v0-platform-chats-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vercel v0 Platform API — Chats. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-chat
      description: Create Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v0-platform-chats.createchat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: continue-chat
      description: Continue Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v0-platform-chats.continuechat
      with:
        chatId: tools.chatId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-chat
      description: Get Chat
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: v0-platform-chats.getchat
      with:
        chatId: tools.chatId
      outputParameters:
      - type: object
        mapping: $.
