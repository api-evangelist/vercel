        limit: 1000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Active CPU
        name: cpu
        type: quota
        metric: hour
        limit: 4
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
