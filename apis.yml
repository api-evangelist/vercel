apis:
  - aid: vercel:vercel
    name: Vercel
    tags:
      - API
    humanURL: ' https://vercel.com/docs'
    properties:
      - url: ' https://vercel.com/docs'
        type: Documentation
    description: 'Vercel is a developer cloud to build and deploy web applications. '
  - aid: vercel:vercel-rest-api
    name: Vercel REST API
    tags:
      - Deployments
      - Domains
      - Projects
      - Teams
      - DNS
      - Certificates
      - Edge Config
      - Environment Variables
      - Webhooks
      - Access Groups
      - Billing
    humanURL: https://vercel.com/docs/rest-api/reference
    properties:
      - url: https://vercel.com/docs/rest-api/reference
        type: Documentation
      - url: https://openapi.vercel.sh/
        type: OpenAPI
      - url: https://vercel.com/docs/rest-api/reference#rate-limits
        type: RateLimits
      - url: https://vercel.com/docs/rest-api/reference#pagination
        type: Pagination
      - url: https://vercel.com/docs/rest-api/reference#versioning
        type: Versioning
    description: >-
      The Vercel REST API provides programmatic access to the Vercel platform.
      All endpoints live under https://api.vercel.com and follow REST
      architecture over SSL. The API covers deployments, domains, projects,
      teams, DNS, certificates, edge config, environment variables, access
      groups, billing, security, webhooks, and more. Authentication uses Bearer
      tokens via the Authorization header.
  - aid: vercel:vercel-ai-gateway-api
    name: Vercel AI Gateway API
    tags:
      - AI
      - AI Gateway
      - LLM
      - Machine Learning
      - Models
    humanURL: https://vercel.com/docs/ai-gateway
    properties:
      - url: https://vercel.com/docs/ai-gateway
        type: Documentation
      - url: https://vercel.com/docs/ai-gateway/getting-started
        type: GettingStarted
      - url: https://vercel.com/docs/ai-gateway/models-and-providers
        type: Documentation
      - url: https://vercel.com/docs/ai-gateway/sdks-and-apis/openai-compat
        type: Documentation
      - url: https://vercel.com/docs/ai-gateway/usage
        type: UsageBilling
    description: >-
      The Vercel AI Gateway provides a unified API to access hundreds of AI
      models from multiple providers through a single endpoint at
      https://ai-gateway.vercel.sh/v1. It offers one key for hundreds of models,
      spend monitoring, automatic retries and fallbacks, embeddings support, and
      zero markup on token pricing. Compatible with the AI SDK, OpenAI SDK, and
      Anthropic SDK.
  - aid: vercel:v0-platform-api
    name: v0 Platform API
    tags:
      - AI
      - Code Generation
      - App Builder
    humanURL: https://v0.dev/docs
    properties:
      - url: https://v0.dev/docs
        type: Documentation
      - url: https://github.com/vercel/v0-sdk
        type: GitHubOrganization
    description: >-
      The v0 Platform API provides programmatic access to v0's AI-powered app
      generation pipeline. It is a REST interface that wraps v0's full code
      generation lifecycle from prompt to project to code files to deployment.
      Capabilities include generating full-stack web apps from natural language
      prompts, structured parsing of generated code, automatic error fixing, and
      linking with rendered previews. A TypeScript SDK is available.
