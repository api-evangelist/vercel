  schemas:
    WebhookEnvelope:
      type: object
      description: |
        Common envelope for every Vercel webhook delivery. Subtypes
        specialize the `type` and `payload` fields.
      required:
        - id
        - type
        - createdAt
        - payload
      properties:
        id:
          type: string
          description: Vercel-assigned event delivery ID.
        type:
          type: string
          description: Event type identifier.
        createdAt:
          type: integer
          format: int64
          description: JavaScript-style timestamp (milliseconds since epoch) when the event was generated.
        region:
          type:
            - string
            - 'null'
          description: Region identifier associated with the event, if any.
        payload:
          type: object
          description: Event-specific payload object.

    TeamUserContext:
      type: object
      description: Common team and user context included in most payloads.
      properties:
        team:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: Team ID, or null for personal accounts.
        user:
          type: object
          properties:
            id:
              type: string
              description: User ID of the actor associated with the event.

    DeploymentSummary:
      type: object
      description: Deployment summary fields used across deployment events.
      properties:
        id:
          type: string
          description: Deployment ID.
        meta:
          type: object
          description: Deployment meta map (e.g. git metadata) supplied at deployment time.
          additionalProperties: true
        url:
          type: string
          description: Deployment URL (the hostname of the deployment).
        name:
          type: string
          description: Project / deployment name.

    DeploymentLinks:
      type: object
      description: Dashboard URLs for the deployment and the parent project.
      properties:
        deployment:
          type: string
          format: uri
          description: Vercel dashboard URL for the deployment.
        project:
          type: string
          format: uri
          description: Vercel dashboard URL for the project.

    DeploymentBaseEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    deployment:
                      $ref: '#/components/schemas/DeploymentSummary'
                    links:
                      $ref: '#/components/schemas/DeploymentLinks'
                    target:
                      type:
                        - string
                        - 'null'
                      description: Deployment target (e.g. `production`, `staging`, or null).
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Project ID.
                    plan:
                      type: string
                      description: Plan name of the team/user owning the project.
                    regions:
                      type: array
                      items:
                        type: string
                      description: Regions targeted by this deployment.

    DeploymentCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.created
            payload:
              type: object
              properties:
                alias:
                  type: array
                  items:
                    type: string
                  description: List of aliases associated with the deployment.

    DeploymentReadyEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.ready

    DeploymentSucceededEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.succeeded

    DeploymentErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.error

    DeploymentCanceledEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.canceled

    DeploymentPromotedEnvelope:
      allOf:
        - $ref: '#/components/schemas/DeploymentBaseEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.promoted

    DeploymentRollbackEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.rollback
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  required:
                    - project
                    - fromDeploymentId
                    - toDeploymentId
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    fromDeploymentId:
                      type: string
                      description: ID of the deployment being replaced.
                    toDeploymentId:
                      type: string
                      description: ID of the deployment being restored.

    DeploymentCleanupEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.cleanup
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    deployment:
                      type: object
                      properties:
                        id:
                          type: string
                        meta:
                          type: object
                          additionalProperties: true
                        url:
                          type: string
                        name:
                          type: string
                        alias:
                          type: array
                          items:
                            type: string
                        target:
                          type:
                            - string
                            - 'null'
                        customEnvironmentId:
                          type:
                            - string
                            - 'null'
                        regions:
                          type: array
                          items:
                            type: string
                    project:
                      type: object
                      properties:
                        id:
                          type: string

    DeploymentCheckRerequestedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.check-rerequested
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    deployment:
                      type: object
                      properties:
                        id:
                          type: string
                    check:
                      type: object
                      properties:
                        id:
                          type: string

    DeploymentIntegrationActionBase:
      type: object
      description: Shared payload for deployment integration action events.
      properties:
        configuration:
          type: object
          properties:
            id:
              type: string
              description: Integration configuration ID.
        installationId:
          type: string
          description: Marketplace installation ID, when applicable.
        resourceId:
          type: string
          description: Integration resource ID, when applicable.
        action:
          type: string
          description: Slug of the integration action.
        deployment:
          type: object
          properties:
            id:
              type: string

    DeploymentIntegrationActionStartEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.integration.action.start
            payload:
              $ref: '#/components/schemas/DeploymentIntegrationActionBase'

    DeploymentIntegrationActionCancelEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.integration.action.cancel
            payload:
              $ref: '#/components/schemas/DeploymentIntegrationActionBase'

    DeploymentIntegrationActionCleanupEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: deployment.integration.action.cleanup
            payload:
              $ref: '#/components/schemas/DeploymentIntegrationActionBase'

    DomainCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.created
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Domain name (e.g. `example.com`).
                        delegated:
                          type: boolean
                          description: Whether the domain was delegated to Vercel.

    DomainAutoRenewChangedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.auto-renew-changed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                    previous:
                      type: boolean
                      description: Previous auto-renew value.
                    next:
                      type: boolean
                      description: New auto-renew value.

    DomainCertificateAddEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.certificate-add
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    cert:
                      type: object
                      description: Certificate details object.
                      additionalProperties: true

    DomainCertificateAddFailedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.certificate-add-failed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    dnsNames:
                      type: array
                      items:
                        type: string
                      description: DNS names that failed to certify.

    DomainCertificateDeletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.certificate-deleted
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    cert:
                      type: object
                      additionalProperties: true

    DomainCertificateRenewEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.certificate-renew
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    cert:
                      type: object
                      additionalProperties: true

    DomainCertificateRenewFailedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.certificate-renew-failed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    dnsNames:
                      type: array
                      items:
                        type: string

    DomainDnsRecordsChangedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.dns-records-changed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    zone:
                      type: string
                      description: DNS zone whose records changed.
                    changes:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                      description: List of DNS changes.

    DomainRenewalEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.renewal
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                    price:
                      type: string
                      description: Decimal price string.
                    expirationDate:
                      type: string
                      format: date-time
                    renewedAt:
                      type: string
                      format: date-time

    DomainRenewalFailedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.renewal-failed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                    errorReason:
                      type: string
                    failedAt:
                      type: string
                      format: date-time

    DomainTransferInBase:
      type: object
      allOf:
        - $ref: '#/components/schemas/TeamUserContext'
        - type: object
          properties:
            domain:
              type: object
              properties:
                name:
                  type: string

    DomainTransferInStartedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.transfer-in-started
            payload:
              $ref: '#/components/schemas/DomainTransferInBase'

    DomainTransferInCompletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.transfer-in-completed
            payload:
              $ref: '#/components/schemas/DomainTransferInBase'

    DomainTransferInFailedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: domain.transfer-in-failed
            payload:
              $ref: '#/components/schemas/DomainTransferInBase'

    ProjectIdentity:
      type: object
      description: Project identity fields used in project events.
      properties:
        project:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    ProjectCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.created
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - $ref: '#/components/schemas/ProjectIdentity'

    ProjectRemovedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.removed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - $ref: '#/components/schemas/ProjectIdentity'

    ProjectRenamedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.renamed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - $ref: '#/components/schemas/ProjectIdentity'
                - type: object
                  properties:
                    previousName:
                      type: string
                      description: Previous project name.

    ProjectEnvVariableBase:
      type: object
      allOf:
        - $ref: '#/components/schemas/TeamUserContext'
        - type: object
          properties:
            projectId:
              type: string
            envVarId:
              type:
                - string
                - 'null'
              description: Environment variable ID. May be null for delete events.

    ProjectEnvVariableCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.env-variable.created
            payload:
              $ref: '#/components/schemas/ProjectEnvVariableBase'

    ProjectEnvVariableUpdatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.env-variable.updated
            payload:
              $ref: '#/components/schemas/ProjectEnvVariableBase'

    ProjectEnvVariableDeletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.env-variable.deleted
            payload:
              $ref: '#/components/schemas/ProjectEnvVariableBase'

    ProjectDomainClassification:
      type: object
      properties:
        target:
          type: string
          enum:
            - production
            - preview
        origin:
          type: string
          enum:
            - default-stable
            - default-redirect
            - custom

    ProjectDomainCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.created
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                        classification:
                          $ref: '#/components/schemas/ProjectDomainClassification'

    ProjectDomainDeletedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.deleted
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                        classification:
                          $ref: '#/components/schemas/ProjectDomainClassification'

    ProjectDomainMovedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.moved
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                    from:
                      type: object
                      properties:
                        projectId:
                          type: string
                    to:
                      type: object
                      properties:
                        projectId:
                          type: string
                    isRedirect:
                      type: boolean

    ProjectDomainVerifiedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.verified
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    domain:
                      type: object
                      properties:
                        name:
                          type: string
                        classification:
                          $ref: '#/components/schemas/ProjectDomainClassification'

    ProjectDomainUnverifiedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.unverified
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    domain:
                      type: object
                      properties:
                        name:
                          type: string

    ProjectDomainUpdatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: project.domain.updated
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    project:
                      type: object
                      properties:
                        id:
                          type: string
                    previous:
                      $ref: '#/components/schemas/ProjectDomainUpdateState'
                    next:
                      $ref: '#/components/schemas/ProjectDomainUpdateState'

    ProjectDomainUpdateState:
      type: object
      properties:
        domain:
          type: string
        redirect:
          type:
            - string
            - 'null'
        redirectStatusCode:
          type:
            - integer
            - 'null'
        gitBranch:
          type:
            - string
            - 'null'

    RollingReleaseObject:
      type: object
      properties:
        projectId:
          type: string
        ownerId:
          type: string
        deploymentIds:
          type: array
          items:
            type: string
        state:
          type: string
          enum:
            - ACTIVE
            - COMPLETE
            - ABORTED
        activeStageIndex:
          type: integer
        default:
          type: object
          properties:
            baseDeploymentId:
              type: string
            targetDeploymentId:
              type: string
            targetPercentage:
              type: number
            targetStartAt:
              type: integer
              description: Timestamp in milliseconds since epoch.
            targetUpdatedAt:
              type: integer
              description: Timestamp in milliseconds since epoch.
        config:
          type: object
          properties:
            target:
              type: string
            stages:
              type: array
              items:
                type: object
                additionalProperties: true
        writtenBy:
          type: string

    ProjectRollingReleaseEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - project.rolling-release.started
                - project.rolling-release.approved
                - project.rolling-release.completed
                - project.rolling-release.aborted
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - $ref: '#/components/schemas/ProjectIdentity'
                - type: object
                  properties:
                    rollingRelease:
                      $ref: '#/components/schemas/RollingReleaseObject'
                    prevRollingRelease:
                      $ref: '#/components/schemas/RollingReleaseObject'

    FlagObject:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        projectId:
          type: string
        createdAt:
          type: integer
          description: Milliseconds since epoch.
        updatedAt:
          type: integer
          description: Milliseconds since epoch.

    FlagCreatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: flag.created
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    flag:
                      $ref: '#/components/schemas/FlagObject'

    FlagUpdatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: flag.updated
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    flag:
                      $ref: '#/components/schemas/FlagObject'
                    previousFlag:
                      type: object
                      properties:
                        id:
                          type: string
                        slug:
                          type: string
                        projectId:
                          type: string
                        createdAt:
                          type: integer
                          description: Milliseconds since epoch.

    IntegrationConfigurationRemovedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-configuration.removed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    configuration:
                      type: object
                      properties:
                        id:
                          type: string
                        projectSelection:
                          type: string
                          enum:
                            - all
                            - selected
                        projects:
                          type: array
                          items:
                            type: string
                          description: Project IDs the integration is scoped to.

    IntegrationConfigurationPermissionUpgradedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-configuration.permission-upgraded
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    configuration:
                      type: object
                      properties:
                        id:
                          type: string
                        projectSelection:
                          type: string
                          enum:
                            - all
                            - selected
                        projects:
                          type: array
                          items:
                            type: string
                    projects:
                      type: object
                      properties:
                        added:
                          type: array
                          items:
                            type: string
                          description: Project IDs added to the integration's scope.
                        removed:
                          type: array
                          items:
                            type: string
                          description: Project IDs removed from the integration's scope.

    IntegrationConfigurationScopeChangeConfirmedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-configuration.scope-change-confirmed
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/TeamUserContext'
                - type: object
                  properties:
                    configuration:
                      type: object
                      properties:
                        id:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string

    IntegrationConfigurationTransferredEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-configuration.transferred
            payload:
              type: object
              properties:
                configuration:
                  type: object
                  properties:
                    id:
                      type: string
                installationId:
                  type: string
                previousTeamId:
                  type: string
                previousAccountId:
                  type: string
                  description: Previous marketplace account ID, for marketplace installations.
                newTeamId:
                  type: string
                newAccountId:
                  type: string
                  description: New marketplace account ID, for marketplace installations.

    IntegrationResourceProjectBase:
      type: object
      properties:
        configuration:
          type: object
          properties:
            id:
              type: string
        installationId:
          type: string
        resourceId:
          type: string
        project:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        projectId:
          type: string
          description: Same as project.id; included by Vercel for convenience.
        productionDomain:
          type: string
          description: Production domain of the project (e.g. `my-app.vercel.app`).
        targets:
          type: array
          items:
            type: string
          description: Deployment targets affected by the connection change.

    IntegrationResourceProjectConnectedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-resource.project-connected
            payload:
              $ref: '#/components/schemas/IntegrationResourceProjectBase'

    IntegrationResourceProjectDisconnectedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: integration-resource.project-disconnected
            payload:
              $ref: '#/components/schemas/IntegrationResourceProjectBase'

    MarketplaceInvoiceBase:
      type: object
      properties:
        configuration:
          type: object
          properties:
            id:
              type: string
        installationId:
          type: string
        invoiceId:
          type: string
        externalInvoiceId:
          type:
            - string
            - 'null'
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        invoiceDate:
          type: string
          format: date-time
        invoiceTotal:
          type: string
          description: Decimal string of the invoice total.

    MarketplaceInvoiceEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - marketplace.invoice.created
                - marketplace.invoice.paid
                - marketplace.invoice.notpaid
                - marketplace.invoice.overdue
            payload:
              $ref: '#/components/schemas/MarketplaceInvoiceBase'

    MarketplaceInvoiceRefundedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: marketplace.invoice.refunded
            payload:
              type: object
              properties:
                configuration:
                  type: object
                  properties:
                    id:
                      type: string
                installationId:
                  type: string
                invoiceId:
                  type: string
                externalInvoiceId:
                  type:
                    - string
                    - 'null'
                period:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
                amount:
                  type: string
                  description: Decimal string for the refunded amount.
                reason:
                  type: string

    MarketplaceMemberChangedEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: marketplace.member.changed
            payload:
              type: object
              properties:
                configuration:
                  type: object
                  properties:
                    id:
                      type: string
                installationId:
                  type: string
                memberId:
                  type: string
                role:
                  type: string
                  enum:
                    - ADMIN
                    - USER
                    - NONE
                globalUserId:
                  type: string
                  description: Requires permission; only present when authorized.
                userEmail:
                  type: string
                  description: Requires permission; only present when authorized.

    AlertItem:
      type: object
      properties:
        startedAt:
          type: string
          format: date-time
        title:
          type: string
        unit:
          type: string
        formattedValues:
          type: object
          additionalProperties: true
        count:
          type: number
        average:
          type: number
        stddev:
          type: number
        zscore:
          type: number
        zscoreThreshold:
          type: number
        alertId:
          type: string
        type:
          type: string
        metric:
          type: string
          description: Metric identifier (e.g. `edge_requests`).

    AlertsTriggeredEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: alerts.triggered
            payload:
              type: object
              properties:
                teamId:
                  type: string
                projectId:
                  type: string
                startedAt:
                  type: integer
                  description: Milliseconds since epoch.
                links:
                  type: object
                  properties:
                    observability:
                      type: string
                      format: uri
                projectSlug:
                  type: string
                teamSlug:
                  type: string
                groupId:
                  type: string
                  description: Optional grouping identifier.
                alerts:
                  type: array
                  items:
                    $ref: '#/components/schemas/AlertItem'
